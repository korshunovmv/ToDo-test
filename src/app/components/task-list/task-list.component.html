<ul class="task-list" *ngIf="tasks.length; else empty">
  <li *ngFor="let task of tasks">
    <app-task-item
      [task]="task"
      (toggleTask)="toggleTask.emit($event)"
      (deleteTask)="deleteTask.emit($event)"
    ></app-task-item>
  </li>
</ul>

<ng-template #empty>
  <p class="empty">Список пуст</p>
</ng-template>
